name: Slack Drip Notify
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  drip:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci

      - name: Send one paper notification
        run: npx tsx scripts/send-slack-drip.ts
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          SITE_URL: ${{ secrets.SITE_URL }}
